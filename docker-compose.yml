services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ecommerce_app
    working_dir: /var/www
    volumes:
      - ./api:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      APP_NAME: EcommerceCatalog
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ecommerce
      DB_USERNAME: laravel
      DB_PASSWORD: secret

  web:
    image: node:20-alpine
    container_name: ecommerce_web
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "5173:5173"
    depends_on:
      - app
    environment:
      VITE_API_URL: /api
      VITE_BACKEND_URL: http://app:8000
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
